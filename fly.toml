app = "claudeterm"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  WORKDIR = "/data/workspaces"
  # Scaling: set these secrets for R2 cloud storage (fly secrets set ...)
  # R2_ENDPOINT = "https://<account>.r2.cloudflarestorage.com"
  # R2_BUCKET = "claudeterm-files"
  # R2_ACCESS_KEY_ID = "..."
  # R2_SECRET_ACCESS_KEY = "..."
  # When R2 is set, /data volume is used as local cache only
  # and multiple VMs can serve requests with shared file state.
  #
  # For DB scaling: migrate to Turso (libsql)
  # DB_URL = "libsql://claudeterm-xxx.turso.io"
  # DB_AUTH_TOKEN = "..."

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  # Allow long WebSocket connections (Claude tasks can take several minutes)
  idle_timeout = 600

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[mounts]
  source = "claudeterm_data"
  destination = "/data"
  initial_size = "10gb"
