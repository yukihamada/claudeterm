name: Auto Implement Feedback

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'What to implement (feedback text or GitHub issue URL)'
        required: true
      dry_run:
        description: 'Dry run (just show plan, do not commit)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@1

      - name: Create feature branch
        id: branch
        run: |
          SLUG=$(echo "${{ inputs.task }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-40)
          BRANCH="auto/$(date +%Y%m%d)-${SLUG}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Implement with Claude Code
        if: inputs.dry_run == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print --dangerously-skip-permissions \
            "You are implementing user feedback for the claudeterm project (a web terminal for Claude Code at chatweb.ai).

          TASK: ${{ inputs.task }}

          Rules:
          1. Read the relevant files first before making changes
          2. Keep changes minimal and focused
          3. Do not break existing functionality
          4. Do not commit secrets or API keys
          5. If the task seems unsafe or destructive, explain why and stop
          6. After implementing, run a quick sanity check (cargo check if Rust was changed)

          The main files are:
          - src/main.rs (Rust backend, axum)
          - static/index.html (single-file frontend)
          - src/billing.rs, src/gemini.rs, src/imagen.rs, src/templates.rs

          Implement the task now."

      - name: Plan only (dry run)
        if: inputs.dry_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print \
            "Analyze this feedback/task for the claudeterm project and write a detailed implementation plan (do NOT make any changes):

          TASK: ${{ inputs.task }}

          Output:
          1. What files need to change
          2. What exactly to change
          3. Estimated effort (small/medium/large)
          4. Any risks or concerns"

      - name: Commit changes
        if: inputs.dry_run == 'false'
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "bot@chatweb.ai"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: ${{ inputs.task }}

          Implemented via auto-implement workflow
          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push origin "${{ steps.branch.outputs.branch }}"
          fi

      - name: Create Pull Request
        if: inputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if there are commits to PR
          DIFF=$(git log origin/main.."${{ steps.branch.outputs.branch }}" --oneline 2>/dev/null | wc -l)
          if [ "$DIFF" -gt "0" ]; then
            gh pr create \
              --title "Auto: ${{ inputs.task }}" \
              --base main \
              --head "${{ steps.branch.outputs.branch }}" \
              --body "## Auto-implemented feedback

          **Task:** ${{ inputs.task }}

          This PR was automatically generated by the auto-implement workflow using Claude Code.

          ### Review checklist
          - [ ] Changes look correct and safe
          - [ ] No secrets or credentials exposed
          - [ ] Existing functionality not broken
          - [ ] Ready to merge

          > ⚠️ Review carefully before merging — auto-generated code."
          else
            echo "No changes were made, skipping PR creation"
          fi
