name: Bug Monitor

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Fetch recent logs
        id: logs
        run: |
          flyctl logs -a claudeterm --no-tail 2>&1 | tail -300 > /tmp/recent_logs.txt || true
          echo "log_lines=$(wc -l < /tmp/recent_logs.txt)" >> "$GITHUB_OUTPUT"

      - name: Detect errors
        id: errors
        run: |
          # Extract ERROR lines (excluding known noise)
          grep -i '\[error\]\|panic\|FATAL\|thread.*panicked' /tmp/recent_logs.txt \
            | grep -v 'Metrics token unavailable' \
            | grep -v 'health check.*passing' \
            | sort | uniq -c | sort -rn | head -20 > /tmp/errors.txt || true

          ERROR_COUNT=$(wc -l < /tmp/errors.txt)
          echo "error_count=$ERROR_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
            # Build summary
            SUMMARY=$(cat /tmp/errors.txt | head -10)
            echo "summary<<EOF" >> "$GITHUB_OUTPUT"
            echo "$SUMMARY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing open issue
        id: existing
        if: steps.errors.outputs.has_errors == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh issue list --label bug-monitor --state open --json number --jq length)
          echo "open_count=$OPEN" >> "$GITHUB_OUTPUT"

      - name: Create GitHub issue for new errors
        if: steps.errors.outputs.has_errors == 'true' && steps.existing.outputs.open_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          gh issue create \
            --title "🐛 Auto-detected errors — $DATE" \
            --label bug-monitor \
            --body "$(cat <<'BODY'
          ## Automatically detected errors in production logs

          **Detected at:** $DATE
          **Source:** claudeterm Fly.io app

          ### Error patterns (occurrences × message):

          \`\`\`
          ${{ steps.errors.outputs.summary }}
          \`\`\`

          ### Next steps
          - [ ] Review errors above
          - [ ] If actionable, implement fix and close this issue
          - [ ] Run \`workflow_dispatch\` on `auto-implement.yml` with issue description to auto-fix

          > Auto-generated by bug-monitor workflow
          BODY
          )"

      - name: All clear
        if: steps.errors.outputs.has_errors == 'false'
        run: echo "✅ No new errors detected in recent logs."
